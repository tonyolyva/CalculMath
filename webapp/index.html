<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalculMath Web</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="calculator" aria-label="CalculMath Web Calculator">
    <header class="calculator__header">
      <h1>CalculMath Web</h1>
      <p>Python + Playwright practice target</p>
    </header>

    <section class="calculator__screen">
      <label for="display" class="sr-only">Calculator display</label>
      <input
        id="display"
        data-testid="display"
        class="display"
        type="text"
        value="0"
        readonly
        aria-label="Display"
      />
    </section>

    <section class="calculator__keys" aria-label="Calculator buttons">
      <button type="button" class="btn btn--muted" data-action="clear">C</button>
      <button type="button" class="btn btn--muted" data-action="delete">⌫</button>
      <button type="button" class="btn btn--operator" data-action="operator" data-value="/">÷</button>
      <button type="button" class="btn btn--operator" data-action="operator" data-value="*">×</button>

      <button type="button" class="btn" data-action="digit" data-value="7">7</button>
      <button type="button" class="btn" data-action="digit" data-value="8">8</button>
      <button type="button" class="btn" data-action="digit" data-value="9">9</button>
      <button type="button" class="btn btn--operator" data-action="operator" data-value="-">−</button>

      <button type="button" class="btn" data-action="digit" data-value="4">4</button>
      <button type="button" class="btn" data-action="digit" data-value="5">5</button>
      <button type="button" class="btn" data-action="digit" data-value="6">6</button>
      <button type="button" class="btn btn--operator" data-action="operator" data-value="+">+</button>

      <button type="button" class="btn" data-action="digit" data-value="1">1</button>
      <button type="button" class="btn" data-action="digit" data-value="2">2</button>
      <button type="button" class="btn" data-action="digit" data-value="3">3</button>
      <button type="button" class="btn btn--equals" data-action="equals">=</button>

      <button type="button" class="btn btn--zero" data-action="digit" data-value="0">0</button>
      <button type="button" class="btn" data-action="digit" data-value=".">.</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
